<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChickenNuggetShack.com — Under Construction</title>
  <style>
    :root {
      --bg: #120b06;
      --panel: rgba(28, 18, 10, 0.72);
      --text: #fff8ef;
      --accent: #ffb11b;
      --accent-2: #ff7a00;
      --muted: #f2d7b0;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        linear-gradient(rgba(12, 7, 3, 0.45), rgba(12, 7, 3, 0.7)),
        url('./chickennuggetshack-under-construction.png') center center / cover no-repeat fixed;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: min(920px, 100%);
      background: var(--panel);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
      overflow: hidden;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 0;
    }

    .content {
      padding: 48px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 16px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255, 177, 27, 0.14);
      color: var(--accent);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.8rem;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(2.1rem, 5vw, 4rem);
      line-height: 0.95;
      letter-spacing: -0.03em;
    }

    .accent {
      color: var(--accent);
    }

    p {
      margin: 0 0 22px;
      font-size: 1.1rem;
      line-height: 1.6;
      color: var(--muted);
      max-width: 42ch;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 8px;
    }

    .btn {
      text-decoration: none;
      border: none;
      border-radius: 999px;
      padding: 14px 20px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.18s ease, opacity 0.18s ease, background 0.18s ease;
    }

    .btn:hover { transform: translateY(-1px); }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #241200;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    .image-wrap {
      min-height: 540px;
      background: url('./chickennuggetshack-under-construction.png') center center / cover no-repeat;
      position: relative;
    }

    .image-wrap::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(18,11,6,0.05), rgba(18,11,6,0.2));
    }

    .footer {
      padding: 18px 24px 24px;
      text-align: center;
      color: rgba(255, 248, 239, 0.72);
      font-size: 0.95rem;
    }

    @media (max-width: 820px) {
      body {
        background-attachment: scroll;
        padding: 14px;
      }

      .hero {
        grid-template-columns: 1fr;
      }

      .content {
        padding: 30px 22px;
      }

      .image-wrap {
        min-height: 320px;
        order: -1;
      }

      p {
        max-width: none;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <section class="hero">
      <div class="content">
        <div class="eyebrow">Fresh Nuggets Incoming</div>
        <h1>
          <span class="accent">ChickenNuggetShack.com</span><br>
          is under construction
        </h1>
        <p>
          We’re busy building something crispy, fun, and nugget-filled. Check back soon while the shack gets its final touches.
        </p>
        <div class="buttons">
          <a class="btn btn-primary" href="#" onclick="return false;">Coming Soon</a>
          <a class="btn btn-secondary" href="mailto:hello@chickennuggetshack.com">Contact Us</a>
        </div>
      </div>
      <div class="image-wrap" aria-label="Chicken Nugget Shack under construction illustration"></div>
    </section>
    <div class="footer">© ChickenNuggetShack.com</div>
  </main>
</body>
</html>
